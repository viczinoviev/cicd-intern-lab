# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [main] # Run on every push to main
  pull_request:
    branches: [main] # Run on every PR targeting main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Fresh Ubuntu VM every run

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Cache dependencies for speed

      - name: Install dependencies
        run: npm ci # Faster and stricter than npm install

      - name: Run tests
        run: npm test
